# Build the `namidb` CLI and `namidb-mcp` server as prebuilt binaries for
# each supported (OS, arch) and attach them to the GitHub Release, so a user
# can run them without a Rust toolchain.
#
# Triggers:
#   * `v*` tag push       → build per-platform archives + upload to the release.
#   * PR / workflow_dispatch → debug build-check only (catch breakage early,
#                              no upload).
#
# The release build inherits the workspace `[profile.release]` (fat LTO,
# codegen-units = 1), so per-target builds are slow but compact. The wheels
# (python-wheels.yml) ship the Python bindings separately; this workflow is
# only the standalone binaries.

name: release-binaries

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "CHANGELOG.md"
      - "LICENSE"
      - "scripts/check-release-metadata.py"
      - ".github/workflows/release-binaries.yml"
  workflow_dispatch: {}

jobs:
  validate-release:
    name: validate release metadata
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Validate Cargo, lockfile, changelog, Python metadata, and license
        run: python scripts/check-release-metadata.py
      - name: Validate v* tag against the declared version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python scripts/check-release-metadata.py \
            --tag "$RELEASE_TAG" --tag-kind engine

  # Fast debug build to catch binary regressions on PRs without paying for the
  # release LTO build or touching the release.
  build-check:
    name: build-check
    needs: validate-release
    if: github.event_name != 'push'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --bin namidb --bin namidb-mcp
      # The HTTP server is shipped with vector + text search ON (see the `upload`
      # job), so gate that exact config on PRs — `ci.yml` builds/tests without
      # features, leaving the feature-gated server code otherwise uncovered.
      - run: cargo build -p namidb-server --features vector-index,text-index

  # On a `v*` tag: ensure the GitHub Release exists before the matrix tries to
  # upload to it. taiki-e/upload-rust-binary-action does NOT create the
  # release, and a lightweight tag has none, so without this the upload jobs
  # fail with "release not found".
  create-release:
    needs: validate-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Create the release for this tag (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes --verify-tag

  # On a `v*` tag: build release archives per platform and upload to the
  # release created above.
  upload:
    name: upload · ${{ matrix.target }}
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, runner: ubuntu-22.04 }
          - { target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm }
          - { target: aarch64-apple-darwin, runner: macos-14 }
          - { target: x86_64-pc-windows-msvc, runner: windows-2022 }
    steps:
      - uses: actions/checkout@v5
      - name: Build and upload namidb + namidb-mcp
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: namidb,namidb-mcp
          target: ${{ matrix.target }}
          archive: namidb-$tag-$target
          tar: unix
          zip: windows
          include: LICENSE,README.md
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
      # The HTTP server, built WITH vector + text search so `CREATE VECTOR INDEX`
      # / `CREATE FULLTEXT INDEX` and index-backed KNN/BM25 work out of the box.
      # A separate step: `features:` applies to every bin in a step's build, and
      # namidb/namidb-mcp do not define these features. `manifest-path` pins the
      # crate so `--features` resolves unambiguously; the distinct `archive` name
      # avoids clobbering the CLI archive above.
      - name: Build and upload namidb-server (vector + text index)
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: namidb-server
          features: vector-index,text-index
          manifest-path: crates/namidb-server/Cargo.toml
          target: ${{ matrix.target }}
          archive: namidb-server-$tag-$target
          tar: unix
          zip: windows
          include: LICENSE,README.md
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
