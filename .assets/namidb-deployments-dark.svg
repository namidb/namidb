<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560"
     role="img" aria-labelledby="t d">
  <title id="t">NamiDB deployments — Server, Embedded, Cloud</title>
  <desc id="d">Three deployment shapes share one engine and converge on a single object-storage bucket as the source of truth.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5eb5c8"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="#0f172a"/>

  <!-- ── Engine block (top) ───────────────────────────────────────── -->
  <g transform="translate(420 40)">
    <rect width="360" height="80" rx="8"
          fill="#1e293b" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect width="360" height="4" rx="2" fill="#5eb5c8"/>
    <text x="180" y="40" text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="19" font-weight="600" fill="#e2e8f0">NamiDB engine</text>
    <text x="180" y="62" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="10.5" fill="#94a3b8"
          letter-spacing="0.2">namidb-core · namidb-storage · namidb-graph · namidb-query</text>
  </g>

  <!-- ── Diverging connectors: engine → cards ─────────────────────── -->
  <g fill="none" stroke="#5eb5c8" stroke-width="1.5" stroke-linecap="round">
    <path d="M 600 124 C 600 170, 400 175, 200 218" marker-end="url(#arr)"/>
    <path d="M 600 124 L 600 218"                    marker-end="url(#arr)"/>
    <path d="M 600 124 C 600 170, 800 175, 1000 218" marker-end="url(#arr)"/>
  </g>

  <!-- ── Card: Server ─────────────────────────────────────────────── -->
  <g transform="translate(80 220)">
    <rect width="240" height="148" rx="8"
          fill="#1e293b" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect width="240" height="36" fill="#1e3a3f"/>
    <path d="M 0 36 L 240 36" stroke="#e2e8f0" stroke-width="1"/>
    <!-- HTTP badge -->
    <rect x="16" y="10" width="46" height="16" rx="3" fill="#5eb5c8"/>
    <text x="39" y="22" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="10" font-weight="600" fill="#0f172a"
          letter-spacing="0.5">HTTP</text>
    <!-- Status -->
    <circle cx="218" cy="18" r="3.2" fill="#5eb5c8"/>
    <text x="208" y="22" text-anchor="end"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="10" fill="#94a3b8">v0.1</text>
    <!-- Title + body -->
    <text x="20" y="70"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="22" font-weight="600" fill="#e2e8f0">Server</text>
    <text x="20" y="94"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="13" fill="#e2e8f0">namidb-server daemon</text>
    <text x="20" y="116"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="11.5" fill="#94a3b8">REST · bearer auth · Docker</text>
    <text x="20" y="134"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="10.5" fill="#94a3b8">POST /v0/cypher</text>
  </g>

  <!-- ── Card: Embedded ───────────────────────────────────────────── -->
  <g transform="translate(480 220)">
    <rect width="240" height="148" rx="8"
          fill="#1e293b" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect width="240" height="36" fill="#1e3a3f"/>
    <path d="M 0 36 L 240 36" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="16" y="10" width="34" height="16" rx="3" fill="#5eb5c8"/>
    <text x="33" y="22" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="10" font-weight="600" fill="#0f172a"
          letter-spacing="0.5">lib</text>
    <circle cx="218" cy="18" r="3.2" fill="#5eb5c8"/>
    <text x="208" y="22" text-anchor="end"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="10" fill="#94a3b8">v0.1</text>
    <text x="20" y="70"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="22" font-weight="600" fill="#e2e8f0">Embedded</text>
    <text x="20" y="94"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="13" fill="#e2e8f0">library in your process</text>
    <text x="20" y="116"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="11.5" fill="#94a3b8">Python · Rust</text>
    <text x="20" y="134"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="10.5" fill="#94a3b8">pip install namidb</text>
  </g>

  <!-- ── Card: Cloud (closed beta) ────────────────────────────────── -->
  <g transform="translate(880 220)">
    <rect width="240" height="148" rx="8"
          fill="#1e293b" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect width="240" height="36" fill="#1e3a3f"/>
    <path d="M 0 36 L 240 36" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Lock icon -->
    <g transform="translate(16 9)">
      <rect x="0" y="8" width="16" height="11" rx="1.5"
            fill="#e2e8f0"/>
      <path d="M 3.5 8 V 5 a 4.5 4.5 0 0 1 9 0 V 8"
            fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
      <circle cx="8" cy="13" r="1.3" fill="#0f172a"/>
    </g>
    <text x="40" y="22"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="10" font-weight="600" fill="#e2e8f0"
          letter-spacing="0.5">closed beta</text>
    <text x="220" y="22" text-anchor="end"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="10" fill="#94a3b8">namidb.com</text>
    <text x="20" y="70"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="22" font-weight="600" fill="#e2e8f0">Cloud</text>
    <text x="20" y="94"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="13" fill="#e2e8f0">managed multi-tenant</text>
    <text x="20" y="116"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="11.5" fill="#94a3b8">scale-to-zero per namespace</text>
    <text x="20" y="134"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="10.5" fill="#94a3b8">LESAI, Corp.</text>
  </g>

  <!-- ── Converging connectors: cards → bucket ────────────────────── -->
  <g fill="none" stroke="#5eb5c8" stroke-width="1.5" stroke-linecap="round">
    <path d="M 200 368 C 200 416, 380 432, 480 446" marker-end="url(#arr)"/>
    <path d="M 600 368 L 600 446"                   marker-end="url(#arr)"/>
    <path d="M 1000 368 C 1000 416, 820 432, 720 446" marker-end="url(#arr)"/>
  </g>

  <!-- ── Bucket (cylinder = object storage) ───────────────────────── -->
  <g transform="translate(420 450)">
    <!-- Body sides + visible bottom arc -->
    <path d="M 0 10 L 0 60 A 180 10 0 0 0 360 60 L 360 10"
          fill="#1e293b" stroke="#e2e8f0" stroke-width="1.5"/>
    <!-- Top ellipse (the visible opening) -->
    <ellipse cx="180" cy="10" rx="180" ry="10"
             fill="#1e3a3f" stroke="#e2e8f0" stroke-width="1.5"/>
    <!-- A faint "stored content" hint inside -->
    <line x1="40"  y1="36" x2="320" y2="36" stroke="#334155" stroke-width="1"/>
    <line x1="40"  y1="46" x2="320" y2="46" stroke="#334155" stroke-width="1"/>
    <!-- Label -->
    <text x="180" y="32" text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="19" font-weight="600" fill="#e2e8f0">Object storage</text>
    <text x="180" y="56" text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-style="italic" font-size="11.5" fill="#94a3b8">one source of truth</text>
  </g>

  <!-- ── Provider row ─────────────────────────────────────────────── -->
  <text x="600" y="538" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="11" fill="#94a3b8"
        letter-spacing="0.3">AWS S3 · Cloudflare R2 · GCS · Azure Blob · MinIO · Tigris</text>

  <!-- ── Footer ───────────────────────────────────────────────────── -->
  <text x="1184" y="552" text-anchor="end"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="9" fill="#64748b">© NamiDB · BSL 1.1</text>
</svg>
